<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>豆沙 · 控制台</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --border:#e6e8eb; --text:#1c2024; --muted:#6b7280;
    --accent:#6366f1; --accent-fg:#fff; --ok:#16a34a; --warn:#d97706; --danger:#dc2626;
    --radius:14px; --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0f1115; --card:#171a21; --border:#262b35; --text:#e6e8eb; --muted:#9aa3af;
      --accent:#818cf8; --accent-fg:#0f1115; --ok:#34d399; --warn:#fbbf24; --danger:#f87171;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35); }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:24px 18px 80px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .brand{font-size:19px;font-weight:680;letter-spacing:.2px}
  .brand small{color:var(--muted);font-weight:500;font-size:13px;margin-left:6px}
  .pills{display:flex;gap:8px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    font-size:12.5px;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
  .pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 35%,var(--border))}
  .pill.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--border))}
  .pill.bad{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 35%,var(--border))}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor;display:inline-block}
  nav.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
  nav.tabs button{appearance:none;background:none;border:none;color:var(--muted);font:inherit;font-weight:600;
    padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  nav.tabs button:hover{color:var(--text)}
  nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 14px;font-size:14px;font-weight:680;display:flex;align-items:center;gap:8px}
  .hidden{display:none!important}
  label.field{display:block;margin-bottom:14px}
  label.field .lab{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:6px}
  .badge{font-size:11px;font-weight:600;color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 35%,var(--border));
    padding:1px 7px;border-radius:999px}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  input[type=text],input[type=number],textarea,select{width:100%;padding:9px 11px;border:1px solid var(--border);
    border-radius:10px;background:var(--bg);color:var(--text);font:inherit;outline:none;transition:border .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
  textarea{resize:vertical;min-height:64px;font-family:inherit}
  textarea.code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
  .switch input{display:none}
  .switch .track{width:40px;height:23px;border-radius:999px;background:var(--border);position:relative;transition:background .15s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:999px;
    background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch input:checked + .track{background:var(--accent)}
  .switch input:checked + .track::after{transform:translateX(17px)}
  button.btn{appearance:none;border:1px solid var(--border);background:var(--card);color:var(--text);
    font:inherit;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;transition:.12s}
  button.btn:hover{border-color:var(--accent);color:var(--accent)}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
  button.btn.primary:hover{filter:brightness(1.05);color:var(--accent-fg)}
  button.btn.sm{padding:5px 10px;font-size:13px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;color:var(--muted);word-break:break-all}
  .list{display:flex;flex-direction:column;gap:8px}
  .uitem{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 12px;border:1px solid var(--border);border-radius:11px;background:var(--bg)}
  .uitem .nm{font-weight:600}.uitem .raw{color:var(--muted);font-size:13px}
  .grow{flex:1 1 auto}
  .ts{max-height:60vh;overflow:auto;display:flex;flex-direction:column;gap:2px}
  .ts .line{padding:6px 8px;border-radius:8px}
  .ts .line:nth-child(odd){background:var(--bg)}
  .ts .clk{color:var(--muted);font-family:ui-monospace,monospace;font-size:12px;margin-right:8px}
  .ts .who{font-weight:600;margin-right:6px}
  .logbox{max-height:62vh;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.55}
  .logbox .ln{padding:2px 6px;border-radius:6px;white-space:pre-wrap;word-break:break-word}
  .logbox .ln:nth-child(odd){background:var(--bg)}
  .logbox .clk{color:var(--muted);margin-right:7px}
  .logbox .lv{font-weight:700;margin-right:7px}
  .logbox .lg{color:var(--muted);margin-right:6px}
  .lv-INFO .lv{color:var(--accent)} .lv-DEBUG .lv{color:var(--muted)}
  .lv-WARNING .lv{color:var(--warn)} .lv-ERROR .lv,.lv-CRITICAL .lv{color:var(--danger)}
  .savebar{position:fixed;left:0;right:0;bottom:0;background:color-mix(in srgb,var(--card) 92%,transparent);
    backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:12px 18px;display:flex;justify-content:flex-end;
    gap:12px;align-items:center}
  .savebar .info{color:var(--muted);font-size:13px;margin-right:auto}
  #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:50}
  .toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);
    padding:10px 16px;border-radius:10px;box-shadow:var(--shadow);font-size:14px;max-width:90vw}
  .toast.ok{border-left-color:var(--ok)}.toast.warn{border-left-color:var(--warn)}.toast.bad{border-left-color:var(--danger)}
  .gate{position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;z-index:100}
  .gate .box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:320px;box-shadow:var(--shadow)}
  .gate h3{margin:0 0 14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span id="brandName">豆沙</span> <small>控制台</small></div>
    <div class="pills" id="topPills"></div>
  </header>

  <nav class="tabs">
    <button data-tab="status" class="active">状态</button>
    <button data-tab="settings">设置</button>
    <button data-tab="members">成员</button>
    <button data-tab="transcript">转写</button>
    <button data-tab="log">日志</button>
  </nav>

  <main>
    <section id="tab-status">
      <div class="grid">
        <div class="card">
          <h3>🔊 试听音色</h3>
          <div class="hint" style="margin-bottom:10px">当前音色：<span class="mono" id="curVoice">—</span></div>
          <textarea id="speakText" placeholder="输入一句话，让它用当前音色在频道里说出来">大家好，这是一条音色测试，听听这个声音怎么样。</textarea>
          <div class="row" style="margin-top:10px">
            <button class="btn primary" onclick="testSpeak()">试听</button>
            <span class="hint">换音色去「设置 → 音色」改 Model ID 后保存即可。</span>
          </div>
        </div>

        <div class="card">
          <h3>🎚️ 转写 / 闭嘴</h3>
          <div class="row" style="margin-bottom:12px">
            <span id="pausePill"></span>
            <button class="btn sm" onclick="doAction('pause')">暂停转写</button>
            <button class="btn sm" onclick="doAction('resume')">恢复转写</button>
          </div>
          <div class="row">
            <input type="number" id="shutupMin" value="10" min="1" style="width:80px">
            <button class="btn sm" onclick="doAction('shutup',{minutes:+document.getElementById('shutupMin').value})">闭嘴 N 分钟</button>
            <button class="btn sm" onclick="doAction('comeback')">立即恢复</button>
          </div>
          <div class="hint" id="muteInfo" style="margin-top:8px"></div>
        </div>

        <div class="card">
          <h3>🔑 密钥状态</h3>
          <div class="pills" id="keyPills"></div>
          <div class="hint" style="margin-top:10px">密钥只在 <span class="mono">.env</span> 改，这里只看是否已配。</div>
        </div>

        <div class="card">
          <h3>⏱️ 计时器</h3>
          <div class="list" id="timerList"><div class="hint">无</div></div>
        </div>
      </div>
    </section>

    <section id="tab-settings" class="hidden">
      <div id="settingsGroups" class="grid"></div>
    </section>

    <section id="tab-members" class="hidden">
      <div class="card">
        <h3>👥 频道成员</h3>
        <div class="list" id="memberList"><div class="hint">—</div></div>
      </div>
    </section>

    <section id="tab-transcript" class="hidden">
      <div class="card">
        <h3>📝 最近转写</h3>
        <div class="ts" id="tsBox"><div class="hint">—</div></div>
      </div>
    </section>

    <section id="tab-log" class="hidden">
      <div class="card">
        <h3>🐞 日志<span class="grow"></span>
          <select id="logLevel" onchange="renderLogs()" style="width:auto;padding:5px 9px">
            <option value="all">全部</option>
            <option value="warn">警告+</option>
            <option value="error">仅错误</option>
          </select>
        </h3>
        <div class="logbox" id="logBox"><div class="hint">—</div></div>
      </div>
    </section>
  </main>
</div>

<div class="savebar hidden" id="saveBar">
  <span class="info" id="saveInfo"></span>
  <button class="btn" onclick="loadConfig()">放弃</button>
  <button class="btn primary" onclick="saveSettings()">保存</button>
</div>

<div id="toast"></div>

<div class="gate hidden" id="gate">
  <div class="box">
    <h3>需要密码</h3>
    <input type="text" id="gatePw" placeholder="Web 密码" onkeydown="if(event.key==='Enter')gateGo()">
    <div class="row" style="margin-top:14px;justify-content:flex-end">
      <button class="btn primary" onclick="gateGo()">进入</button>
    </div>
  </div>
</div>

<script>
const $=(s,e=document)=>e.querySelector(s), $$=(s,e=document)=>[...e.querySelectorAll(s)];
const TK='mbot_token';
let CFG=null, ORIG={}, STATE=null;
const tok=()=>localStorage.getItem(TK)||'';
const setTok=t=>t?localStorage.setItem(TK,t):localStorage.removeItem(TK);

async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(tok())h['Authorization']='Bearer '+tok();
  const r=await fetch(path,{...opts,headers:{...h,...(opts.headers||{})}});
  if(r.status===401){setTok('');openGate();throw new Error('401');}
  return r;
}
const jget=async p=>(await api(p)).json();
const jpost=async(p,b)=>(await api(p,{method:'POST',body:JSON.stringify(b||{})})).json();

function toast(msg,kind='ok'){
  const t=document.createElement('div');t.className='toast '+kind;t.textContent=msg;
  $('#toast').appendChild(t);setTimeout(()=>t.remove(),3200);
}
function openGate(){$('#gate').classList.remove('hidden');setTimeout(()=>$('#gatePw').focus(),50);}
function gateGo(){setTok($('#gatePw').value.trim());$('#gate').classList.add('hidden');init();}

// ---- tabs ----
$$('nav.tabs button').forEach(b=>b.onclick=()=>{
  $$('nav.tabs button').forEach(x=>x.classList.toggle('active',x===b));
  $$('main > section').forEach(s=>s.classList.toggle('hidden',s.id!=='tab-'+b.dataset.tab));
  $('#saveBar').classList.toggle('hidden',b.dataset.tab!=='settings');
  if(b.dataset.tab==='settings'&&!CFG)loadConfig();
  if(b.dataset.tab==='log')loadLogs();
});

// ---- state ----
const pill=(t,k='')=>`<span class="pill ${k}"><span class="dot"></span>${t}</span>`;
async function loadState(){try{STATE=await jget('/api/state');renderState();}catch(e){}}
function renderState(){
  const s=STATE;if(!s)return;
  const _nm=s.username||'豆沙'; $('#brandName').textContent=_nm; document.title=_nm+' · 控制台';
  $('#topPills').innerHTML =
    pill(s.connected?'已连接':'未连接',s.connected?'ok':'bad')+
    (s.channel?pill('频道 '+s.channel):'')+
    pill(s.paused?'转写已暂停':'转写中',s.paused?'warn':'ok')+
    (s.muted?pill('闭嘴 '+s.mute_remaining+'s',' warn'):'')+
    (s.speaking?pill('说话中','ok'):'');
  $('#curVoice').textContent=s.voice_id||'(未设置)';
  $('#pausePill').outerHTML=`<span id="pausePill">${pill(s.paused?'已暂停':'转写中',s.paused?'warn':'ok')}</span>`;
  $('#muteInfo').textContent=s.muted?('闭嘴中，剩 '+s.mute_remaining+' 秒'):'';
  const k=s.keys||{};
  $('#keyPills').innerHTML=Object.entries({OpenRouter:k.openrouter,DashScope:k.dashscope,Fish:k.fish,Gemini:k.gemini})
    .map(([n,v])=>pill(n,v?'ok':'bad')).join('');
  $('#timerList').innerHTML=(s.timers&&s.timers.length)
    ? s.timers.map(t=>`<div class="uitem"><span class="grow">${esc(t.label||'计时')}</span><span class="mono">${t.remaining}s</span></div>`).join('')
    : '<div class="hint">无</div>';
  // members
  $('#memberList').innerHTML=(s.users&&s.users.length)? s.users.map(u=>`
    <div class="uitem">
      <span class="nm">${esc(u.name)}</span><span class="raw">(${esc(u.raw)})</span>
      <span class="pill ${u.status==='除名'?'bad':(u.status==='已绑定'?'ok':'')}">${u.status}</span>
      <span class="grow"></span>
      <input type="text" placeholder="改名" id="bn${u.idx}" style="width:120px">
      <label class="switch" title="存档(跨会话)"><input type="checkbox" id="bs${u.idx}"><span class="track"></span></label>
      <button class="btn sm" onclick="bindUser(${u.idx})">绑定</button>
      <button class="btn sm" onclick="doAction('exclude',{idx:${u.idx}})">除名</button>
    </div>`).join('') : '<div class="hint">当前没有其他人</div>';
  // transcript
  $('#tsBox').innerHTML=(s.transcript&&s.transcript.length)? s.transcript.map(x=>`
    <div class="line"><span class="clk">${x.clock}</span><span class="who">${esc(x.user)}</span>${esc(x.text)}</div>`).join('')
    : '<div class="hint">还没有转写</div>';
}
function esc(t){const d=document.createElement('div');d.textContent=t==null?'':t;return d.innerHTML;}

async function bindUser(idx){
  const nm=$('#bn'+idx).value.trim(); if(!nm)return toast('先填名字','warn');
  const save=$('#bs'+idx).checked;
  if((await jpost('/api/action/bind',{idx,name:nm,save})).ok){toast('已绑定 → '+nm);loadState();}
  else toast('绑定失败','bad');
}
async function doAction(name,data){
  const r=await jpost('/api/action/'+name,data||{});
  toast(r.ok?'已执行':'未执行',r.ok?'ok':'warn');if(r.ok)loadState();
}
async function testSpeak(){
  const r=await jpost('/api/test_speak',{text:$('#speakText').value});
  toast(r.ok?'已让它说':'没说（空文本或未连接）',r.ok?'ok':'warn');
}

// ---- logs ----
let LOGS=[], lastLogSeq=0;
async function loadLogs(){
  try{
    const d=await jget('/api/logs?after='+lastLogSeq);
    if(d.lines&&d.lines.length){
      LOGS.push(...d.lines); if(LOGS.length>1500)LOGS=LOGS.slice(-1500);
      lastLogSeq=d.lines[d.lines.length-1].seq; renderLogs();
    }
  }catch(e){}
}
function renderLogs(){
  const f=$('#logLevel').value, box=$('#logBox');
  const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<48;
  const rows=LOGS.filter(r=>f==='all'||(f==='warn'&&r.level!=='INFO'&&r.level!=='DEBUG')||(f==='error'&&(r.level==='ERROR'||r.level==='CRITICAL')));
  box.innerHTML=rows.length
    ? rows.map(r=>`<div class="ln lv-${esc(r.level)}"><span class="clk">${r.clock}</span><span class="lv">${esc(r.level[0])}</span><span class="lg">${esc(r.logger)}</span>${esc(r.msg)}</div>`).join('')
    : '<div class="hint">暂无日志</div>';
  if(atBottom)box.scrollTop=box.scrollHeight;
}

// ---- settings ----
async function loadConfig(){
  const d=await jget('/api/config');CFG=d.groups;ORIG={};
  const groups={};CFG.forEach(f=>(groups[f.group]=groups[f.group]||[]).push(f));
  $('#settingsGroups').innerHTML=Object.entries(groups).map(([g,fs])=>`
    <div class="card"><h3>${esc(g)}</h3>${fs.map(fieldHTML).join('')}</div>`).join('');
  updateDirty();
}
function valStr(f){
  if(f.type==='bool')return !!f.value;
  if(f.type==='json')return JSON.stringify(f.value||{},null,2);
  if(f.type==='list')return (f.value||[]).join(', ');
  return f.value==null?'':String(f.value);
}
function fieldHTML(f){
  ORIG[f.path]=valStr(f);
  const badge=f.hot?'':'<span class="badge">需重启</span>';
  const hint=f.hint?`<div class="hint">${esc(f.hint)}</div>`:'';
  let ctl;
  if(f.type==='bool')
    ctl=`<label class="switch"><input type="checkbox" data-path="${f.path}" data-type="bool" ${f.value?'checked':''} oninput="updateDirty()"><span class="track"></span></label>`;
  else if(f.type==='enum')
    ctl=`<select data-path="${f.path}" oninput="updateDirty()">${f.options.map(o=>`<option ${o===f.value?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  else if(f.type==='text'||f.type==='json')
    ctl=`<textarea class="${f.type==='json'?'code':''}" data-path="${f.path}" oninput="updateDirty()">${esc(valStr(f))}</textarea>`;
  else
    ctl=`<input type="${f.type==='int'||f.type==='float'?'number':'text'}" step="any" data-path="${f.path}" value="${esc(valStr(f))}" oninput="updateDirty()">`;
  return `<label class="field"><span class="lab">${esc(f.label)} ${badge}</span>${ctl}${hint}</label>`;
}
function curVal(el){return el.dataset.type==='bool'?el.checked:el.value;}
function collectDirty(){
  const patch={};
  $$('#settingsGroups [data-path]').forEach(el=>{
    const p=el.dataset.path, cur=curVal(el);
    if(String(cur)!==String(ORIG[p]))patch[p]=cur;
  });
  return patch;
}
function updateDirty(){
  const n=Object.keys(collectDirty()).length;
  $('#saveInfo').textContent=n?`${n} 处改动未保存`:'无改动';
}
async function saveSettings(){
  const patch=collectDirty();
  if(!Object.keys(patch).length)return toast('没有改动','warn');
  const res=await jpost('/api/config',patch);
  if(res.errors&&Object.keys(res.errors).length)toast('部分字段格式错误：'+Object.keys(res.errors).join(','),'bad');
  let msg='已保存 '+(res.changed||[]).length+' 项';
  if(res.needs_restart&&res.needs_restart.length)msg+='；其中需重启生效：'+res.needs_restart.length+' 项';
  toast(msg,res.needs_restart&&res.needs_restart.length?'warn':'ok');
  loadConfig();
}

// ---- init ----
async function init(){
  try{
    const r=await(await fetch('/api/needauth')).json();
    if(r.auth&&!tok()){openGate();return;}
  }catch(e){}
  loadState();
}
init();
setInterval(()=>{
  if(!$('#gate').classList.contains('hidden'))return;
  loadState();
  const a=$('nav.tabs button.active'); if(a&&a.dataset.tab==='log')loadLogs();
},3000);
</script>
</body>
</html>
